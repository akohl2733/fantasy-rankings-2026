services:
  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    command: uvicorn src.main:app --host 0.0.0.0 -p 8000 --reload
    volumes:
      - ./backend:/app
    
  frontend:
    build: 
      context: ./frontend
      dockerfile: Dockerfile
    user: root
    ports:
      - "3000:3000"
    environment:
      - HOSTNAME=0.0.0.0
    volumes:
      - ./frontend:/app
      - /app/.next
      - /app/node_modules
